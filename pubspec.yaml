
name: staybea_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.0.0
  google_sign_in: ^6.1.1
  flutter_facebook_auth: ^6.0.0
  file_picker: ^10.3.10
  image_picker: ^1.0.7
  lottie: ^3.3.1
  share_plus: ^12.0.1
  translator: ^1.0.4+1
  shared_preferences: ^2.5.3
  get: ^4.7.3
  equatable: ^2.0.5
  flutter_bloc: ^8.1.3
  dio: ^5.4.0
  fluttertoast: ^9.0.0
  font_awesome_flutter: ^11.0.0
  geolocator: ^14.0.2
  geocoding: ^2.1.0
  shimmer: ^3.0.0

  # Optional (replace translator)
  # google_mlkit_translation: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/dating-logo.png"
  web:
    generate: true
    name: "Staybea"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo/dating-logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/image/
    - assets/profile/
    - assets/intro/
    - assets/icon/
    - assets/auth/
    - assets/logo/
    - assets/location/